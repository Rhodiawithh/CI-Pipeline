name: CI Pipeline

on:
  push:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov flake8

      - name: Run tests
        run: |
          pytest Project/ --cov=Project/cart --cov-report=term-missing

      - name: Run linter
        run: |
          flake8 .